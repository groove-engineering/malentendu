crossing: samba-x-detroit-techno
atoms:
  - samba
  - detroit-techno
frame_from: detroit-techno
tension: "syncopated samba percussion (pandeiro, tamborim, surdo accents) threading through a four-on-the-floor techno grid; Afro-Brazilian polyrhythm as friction inside machine funk, not flattened into quantized loops"
avoid: "generic world-music fusion, tropical house, smooth Latin-flavored EDM, quantized samba loops that erase the swing; anything that reduces samba to a preset or a sample pack"
creolizes: "two Black Atlantic musics from different hemispheres meet on the grid: Bahian batucada polyrhythm against Detroit machine funk — neither absorbs the other, both are structurally present and audibly distinct"
opacity_preserved: "the samba stays syncopated and unquantized even inside the 4/4 frame; it is not decoded into a techno-compatible loop — the friction is the point, not a problem to solve"
self_implication: "an AI fusing Afro-Brazilian and African-American musics is already inside the extraction it critiques; the crossing owns this by foregrounding the structural tension rather than smoothing it into content"
held_by:
  - "the maker"
