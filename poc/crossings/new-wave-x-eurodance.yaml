crossing: new-wave-x-eurodance
atoms:
  - new-wave
  - eurodance
frame_from: new-wave
tension: "the angular, polyrhythmic art-funk of Talking Heads' Remain in Light meeting the bouncy reggae-pop skank of Ace of Base; both borrowed a Black Atlantic groove (afrobeat on one side, dancehall on the other) and ran it through a white European/American pop machine — the crossing foregrounds that shared extraction rather than smoothing it"
avoid: "generic 80s synth-pop pastiche, tropical house, clean retro nostalgia; anything that erases the African and Caribbean rhythmic DNA underneath both genres"
creolizes: "two moments of pop-world-music contact — New York art-rock absorbing Fela's polyrhythm (1980) and Swedish pop absorbing Jamaican skank (1992) — placed face to face; the friction is in what each kept and what each flattened"
opacity_preserved: "the afrobeat polyrhythm stays polyrhythmic, not quantized into a pop grid; the dancehall skank stays syncopated, not reduced to a novelty texture — the listener should hear two distinct borrowings, not one smooth fusion"
self_implication: "Tristan's thesis itself is an act of legibility — naming the 'secret link' between two appropriations; the crossing owns this by making the extraction audible rather than hiding it behind enjoyment"
held_by:
  - "Tristan"
