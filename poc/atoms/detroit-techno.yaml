# Detroit techno — genre atom. Status: proposed. Musicological claims sourced and
# verified against English Wikipedia articles "Detroit techno", "The Belleville
# Three", "Cybotron (American band)", "Strings of Life", "Underground Resistance",
# "Techno! The New Dance Sound of Detroit", Carnegie Hall Timeline of African
# American Music, and Rolling Stone (fetched and read July 2026). The agent fills
# `musicological` only; the human-owned layers (constraints / felt / political /
# exemplars) are left empty.
atom: detroit-techno
status: proposed

musicological:
  - claim: "emerged in the mid-1980s in Detroit, Michigan"
    source:
      citation: "Wikipedia (EN), 'Detroit techno', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Detroit_techno"
  - claim: "created by the Belleville Three — Juan Atkins, Derrick May, and Kevin Saunderson — high school friends from Belleville, Michigan, who made electronic music tracks in their basements"
    source:
      citation: "Wikipedia (EN), 'The Belleville Three', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/The_Belleville_Three"
  - claim: "stylistic origins include electro, industrial music, Chicago house, and synth-pop"
    source:
      citation: "Wikipedia (EN), 'Detroit techno', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Detroit_techno"
  - claim: "the Belleville Three were influenced by Kraftwerk, Parliament-Funkadelic, Prince, the B-52's, and Yellow Magic Orchestra, heard through DJ Charles 'The Electrifying Mojo' Johnson's radio broadcasts on WGPR in Detroit"
    source:
      citation: "Wikipedia (EN), 'The Belleville Three', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/The_Belleville_Three"
  - claim: "Juan Atkins took a Future Studies course in high school using Alvin Toffler's 'Future Shock'; Toffler's concept of 'techno rebels' from 'The Third Wave' inspired the use of the word 'techno', and Atkins' label Metroplex derives from Toffler's term 'metropolitan complex'"
    source:
      citation: "Rolling Stone, 'Birth of the Techno: Juan Atkins on the Early Days of a Dance-Music Revolution'"
      locator: "https://www.rollingstone.com/music/music-features/juan-atkins-detroit-techno-1235075186/"
  - claim: "generally produced in 4/4 time with a repetitive four-on-the-floor beat, at tempos typically between 120 and 150 BPM"
    source:
      citation: "Carnegie Hall, Timeline of African American Music — Detroit Techno"
      locator: "https://timeline.carnegiehall.org/genres/detroit-techno"
  - claim: "primarily instrumental with occasional vocal sections, blending analog and digital timbres to create percussive funk grooves"
    source:
      citation: "Carnegie Hall, Timeline of African American Music — Detroit Techno"
      locator: "https://timeline.carnegiehall.org/genres/detroit-techno"
  - claim: "key instruments include the Roland TR-808 and TR-909 drum machines, the Roland TB-303 bass synthesizer, and various synthesizers including the Yamaha DX7"
    source:
      citation: "Wikipedia (EN), 'Techno', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Techno"
  - claim: "Cybotron (Juan Atkins and Richard Davis) released 'Alleys of Your Mind' in 1981 on Deep Space Records, selling 15,000 copies; their 1984 single 'Techno City' was one of the earliest uses of the word 'techno' applied to this style"
    source:
      citation: "Wikipedia (EN), 'Cybotron (American band)', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Cybotron_(American_band)"
  - claim: "Juan Atkins founded the Metroplex record label in 1985 and began releasing music as Model 500; Derrick May's Transmat began as a sublabel of Metroplex; Kevin Saunderson founded KMS"
    source:
      citation: "Wikipedia (EN), 'The Belleville Three', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/The_Belleville_Three"
  - claim: "Derrick May's 'Strings of Life' (1987), released as Rhythim Is Rhythim on Transmat, is built on a piano sequence sped up with added loops, percussion, and string samples; LA Weekly ranked it number one in their '20 Best Dance Music Tracks in History' (2015)"
    source:
      citation: "Wikipedia (EN), 'Strings of Life', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Strings_of_Life"
  - claim: "in 1988, UK music entrepreneur Neil Rushton compiled 'Techno! The New Dance Sound of Detroit' for Virgin Records; the working title had been 'The House Sound of Detroit' but the Belleville Three voted to use 'techno' instead, introducing the genre to European audiences"
    source:
      citation: "Wikipedia (EN), 'Techno! The New Dance Sound of Detroit', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Techno!_The_New_Dance_Sound_of_Detroit"
  - claim: "Underground Resistance was established in 1989 by 'Mad' Mike Banks and Jeff Mills, adopting a militant anti-corporate ethos that related Detroit techno aesthetics to the social and economic circumstances of Reagan-era inner-city recession"
    source:
      citation: "Wikipedia (EN), 'Underground Resistance', accessed July 2026"
      locator: "https://en.wikipedia.org/wiki/Underground_Resistance"
  - claim: "emerged from a suburban Black middle-class community during the city's deindustrialization and population decline; rooted in independent Black entrepreneurship and queer dance club culture"
    source:
      citation: "Carnegie Hall, Timeline of African American Music — Detroit Techno"
      locator: "https://timeline.carnegiehall.org/genres/detroit-techno"
